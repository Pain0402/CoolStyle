name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore src/Backend/FashionEcommerce.slnx

      - name: Build
        run: dotnet build src/Backend/FashionEcommerce.slnx --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test src/Backend/FashionEcommerce.Tests/FashionEcommerce.Tests.csproj --no-build --configuration Release --verbosity normal

  frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: src/Frontend

      - name: Type check & Build
        run: npm run build
        working-directory: src/Frontend
        env:
          VITE_API_URL: /api
